name: Build Windows

on:
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node dependencies
        run: pnpm install

      - name: Build main & renderer
        run: pnpm build

      # ── Python / PyInstaller ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python venv & install deps
        shell: pwsh
        run: |
          python -m venv .pyinstaller-venv
          .\.pyinstaller-venv\Scripts\pip install pyinstaller
          .\.pyinstaller-venv\Scripts\pip install ctranslate2 sentencepiece
          .\.pyinstaller-venv\Scripts\pip install "numpy<2" "torch==2.2.2" "transformers==4.41.2"
          .\.pyinstaller-venv\Scripts\pip install huggingface_hub

      - name: Build Python binaries (PyInstaller)
        shell: pwsh
        run: |
          .\.pyinstaller-venv\Scripts\Activate.ps1

          pyinstaller --onedir `
            --distpath dist/pyinstaller `
            --workpath build/pyinstaller `
            --name translate-server `
            --hidden-import=ctranslate2 `
            --hidden-import=sentencepiece `
            --collect-all ctranslate2 `
            --collect-all sentencepiece `
            --noconfirm `
            native/ctranslate2/translate_server.py

          pyinstaller --onedir `
            --distpath dist/pyinstaller `
            --workpath build/pyinstaller `
            --name convert-model `
            --hidden-import=ctranslate2 `
            --hidden-import=sentencepiece `
            --hidden-import=transformers `
            --hidden-import=huggingface_hub `
            --hidden-import=torch `
            --collect-all ctranslate2 `
            --collect-all sentencepiece `
            --collect-all transformers `
            --noconfirm `
            native/ctranslate2/convert_model.py

      - name: Verify Python binaries
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\pyinstaller\translate-server\translate-server.exe")) {
            Write-Error "translate-server.exe not found"
            exit 1
          }
          if (-not (Test-Path "dist\pyinstaller\convert-model\convert-model.exe")) {
            Write-Error "convert-model.exe not found"
            exit 1
          }
          Write-Host "Python binaries OK"

      # ── whisper.cpp ──
      - name: Build whisper.cpp
        shell: pwsh
        run: |
          $WHISPER_CPP_VERSION = "v1.7.4"
          $BUILD_DIR = "$env:RUNNER_TEMP\whisper-cpp-build"
          $OUTPUT_DIR = "dist\whisper-cpp"

          git clone --depth 1 --branch $WHISPER_CPP_VERSION https://github.com/ggerganov/whisper.cpp.git $BUILD_DIR

          cmake -S $BUILD_DIR -B "$BUILD_DIR\build" -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON
          cmake --build "$BUILD_DIR\build" --config Release -j $env:NUMBER_OF_PROCESSORS

          New-Item -ItemType Directory -Force -Path $OUTPUT_DIR | Out-Null

          # Copy executables
          foreach ($bin in @("whisper-server", "whisper-cli")) {
            $candidates = @(
              "$BUILD_DIR\build\bin\Release\$bin.exe",
              "$BUILD_DIR\build\bin\$bin.exe"
            )
            foreach ($candidate in $candidates) {
              if (Test-Path $candidate) {
                Copy-Item $candidate "$OUTPUT_DIR\$bin.exe"
                Write-Host "Copied $bin.exe"
                break
              }
            }
          }

          # Copy DLLs
          Get-ChildItem -Path "$BUILD_DIR\build" -Recurse -Include "ggml*.dll","whisper*.dll" | ForEach-Object {
            $dest = "$OUTPUT_DIR\$($_.Name)"
            if (-not (Test-Path $dest)) {
              Copy-Item $_.FullName $dest
              Write-Host "Copied $($_.Name)"
            }
          }

          # Verify
          if (-not (Test-Path "$OUTPUT_DIR\whisper-server.exe")) {
            Write-Error "whisper-server.exe not found"
            exit 1
          }
          Write-Host "whisper.cpp binaries OK"
          Get-ChildItem $OUTPUT_DIR

      # ── Electron Builder ──
      - name: Build Windows installer
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release artifacts
        shell: pwsh
        run: Get-ChildItem release -Filter "*.exe" | Format-Table Name, Length

      # ── Upload ──
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.exe.blockmap
          retention-days: 30
